<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1122 794" width="1122" height="794">
  <!-- Cream/White background -->
  <rect width="1122" height="794" fill="#FAF8F5"/>
  
  <!-- Double Gold Inner Border -->
  <rect x="30" y="30" width="1062" height="734" fill="none" stroke="#D4AF37" stroke-width="2" rx="8"/>
  <rect x="40" y="40" width="1042" height="714" fill="none" stroke="#D4AF37" stroke-width="0.75" rx="6"/>
  
  <!-- Top Left Wave: Navy with Gold edge -->
  <path d="M 0,0 L 420,0 C 370,120 200,280 0,340 Z" fill="#0D1B2A"/>
  <path d="M 0,340 C 200,280 370,120 420,0 L 430,0 C 380,125 205,285 0,348 Z" fill="#D4AF37"/>
  
  <!-- Bottom Right Wave: Navy with Gold edge -->
  <path d="M 1122,794 L 702,794 C 752,674 922,514 1122,454 Z" fill="#0D1B2A"/>
  <path d="M 1122,454 C 922,514 752,674 702,794 L 692,794 C 742,669 917,509 1122,446 Z" fill="#D4AF37"/>
  
  <!-- Top Center Golden Star Ornament -->
  <g transform="translate(561, 95)">
    <!-- Circle wrapper -->
    <circle r="22" fill="none" stroke="#D4AF37" stroke-width="1.5"/>
    <circle r="18" fill="none" stroke="#D4AF37" stroke-width="0.5" stroke-dasharray="2,2"/>
    <!-- 8-pointed star -->
    <path d="M 0,-12 L 3,-3 L 12,0 L 3,3 L 0,12 L -3,3 L -12,0 L -3,-3 Z" fill="#D4AF37"/>
  </g>
</svg>
