<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1122 794" width="1122" height="794">
  <!-- Deep Navy background -->
  <rect width="1122" height="794" fill="#0D1B2A"/>
  
  <!-- Double Gold Inner Border -->
  <rect x="30" y="30" width="1062" height="734" fill="none" stroke="#D4AF37" stroke-width="2" rx="8"/>
  <rect x="40" y="40" width="1042" height="714" fill="none" stroke="#D4AF37" stroke-width="0.75" rx="6"/>
  
  <!-- Top Left Accent: Geometric gold lines and overlay -->
  <path d="M 0,0 L 250,0 L 0,250 Z" fill="#D4AF37" opacity="0.15"/>
  <line x1="0" y1="260" x2="260" y2="0" stroke="#D4AF37" stroke-width="1.5" opacity="0.6"/>
  <line x1="0" y1="240" x2="240" y2="0" stroke="#D4AF37" stroke-width="0.75" opacity="0.4"/>
  
  <!-- Bottom Right Accent: Geometric gold lines and overlay -->
  <path d="M 1122,794 L 872,794 L 1122,544 Z" fill="#D4AF37" opacity="0.15"/>
  <line x1="862" y1="794" x2="1122" y2="534" stroke="#D4AF37" stroke-width="1.5" opacity="0.6"/>
  <line x1="882" y1="794" x2="1122" y2="554" stroke="#D4AF37" stroke-width="0.75" opacity="0.4"/>

  <!-- Left & Right Gold Stripe Bars -->
  <path d="M 0,180 L 15,195 L 15,599 L 0,614 Z" fill="#D4AF37"/>
  <path d="M 1122,180 L 1107,195 L 1107,599 L 1122,614 Z" fill="#D4AF37"/>

  <!-- Top Center Golden Crest -->
  <g transform="translate(561, 95)">
    <circle r="22" fill="none" stroke="#D4AF37" stroke-width="1.5"/>
    <circle r="17" fill="none" stroke="#D4AF37" stroke-width="0.75"/>
    <path d="M -10,-5 C -5,-12 5,-12 10,-5 C 5,2 -5,2 -10,-5 Z" fill="#D4AF37" opacity="0.5"/>
    <polygon points="0,-8 2,-2 8,-2 3,1 5,7 0,3 -5,7 -3,1 -8,-2 -2,-2" fill="#D4AF37"/>
  </g>
</svg>
